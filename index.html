<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>세미패키지 옵션투어</title>
  <meta name="description" content="세미패키지 옵션투어 링크 안내" />
  <meta property="og:title" content="세미패키지 옵션투어" />
  <meta property="og:description" content="구매링크와 참고영상을 확인하세요." />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#eaf8ff" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
        "Noto Sans KR", "Segoe UI", Roboto, Arial, sans-serif;
      background: #f4fbff;
      color: #14213d;
    }
    .page {
      width: min(100%, 941px);
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
    }

    /* 포스터 */
    .poster {
      display: block;
      width: 100%;
      height: auto;
      margin: 0;
    }

    /* 링크 영역 */
    .links {
      padding: 18px 16px 32px;
      background: linear-gradient(180deg, #ffffff 0%, #eefaff 100%);
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 58px;
      padding: 14px 18px;
      border-radius: 18px;
      color: #fff;
      text-decoration: none;
      font-size: 17px;
      font-weight: 900;
      box-shadow: 0 10px 22px rgba(0,0,0,.13);
      letter-spacing: -.02em;
      position: relative;
      overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      animation: shine 3s infinite;
    }
    @keyframes shine {
      0%{ left:-100%; } 50%{ left:100%; } 100%{ left:100%; }
    }
    .btn small {
      font-size: 13px;
      opacity: .9;
      font-weight: 800;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .sf    { background: linear-gradient(135deg, #1689d7, #0d6ab8); }
    .la    { background: linear-gradient(135deg, #69b84e, #4a9a30); }
    .oshow { background: linear-gradient(135deg, #ef6363, #d43c3c); }
    .heli  { background: linear-gradient(135deg, #f59a16, #d97d00); }

    /* 복사 버튼 */
    .copy {
      margin-top: 14px;
      width: 100%;
      border: 0;
      border-radius: 999px;
      padding: 14px 16px;
      background: #14213d;
      color: #fff;
      font-weight: 900;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(0,0,0,.18);
      transition: opacity 0.2s;
    }
    .copy:active { opacity: 0.8; }

    @media (min-width: 640px) {
      .links { padding: 22px 24px 36px; }
      .grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
